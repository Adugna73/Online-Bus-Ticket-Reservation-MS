version: '3.8'
services:
  # ---------------------
  # PostgreSQL
  # ---------------------
  postgres:
    image: postgres:15.5
    container_name: bus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${PG_USER:-online_bus_user}"
      POSTGRES_PASSWORD: "${PG_PASSWORD}"
      POSTGRES_DB: "${PG_DB:-online_bus_db}"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${PG_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-online_bus_user} -d ${PG_DB:-online_bus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------
  # DB setup (generate + migrate + seed) - one-shot
  # ---------------------
  db-setup:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: runner
    container_name: bus-db-setup
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${PG_USER:-online_bus_user}:${PG_PASSWORD_URLENC}@postgres:5432/${PG_DB:-online_bus_db}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "npx prisma generate && npx prisma migrate deploy && npm run db:seed || true"
    restart: "no"
    networks:
      - internal

  # ---------------------
  # Web App
  # ---------------------
  web:
    image: ${APP_IMAGE:-bus-ticket-web:latest}
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: runner
    container_name: bus-web
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${PG_USER:-online_bus_user}:${PG_PASSWORD_URLENC}@postgres:5432/${PG_DB:-online_bus_db}?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3030}
    ports:
      - "3030:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL","wget -qO- --timeout=2 --tries=1 http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
